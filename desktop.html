<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC J.A.R.V.I.S.</title>
<style>
*{box-sizing:border-box} body{margin:0;height:100vh;background:#05070b;color:#d8f7ff;font-family:Segoe UI,system-ui,sans-serif;overflow:hidden}
:root{--panel:#0d1520;--line:#153247;--cyan:#31d9ff;--blue:#1474ff;--green:#2cff9a;--gold:#ffd166;--red:#ff4d6d;--muted:#7a9aaa}
.shell{height:100vh;display:grid;grid-template-columns:320px minmax(420px,1fr) 380px;grid-template-rows:72px 1fr;gap:1px;background:var(--line)}
.top{grid-column:1/4;background:#07101a;display:flex;align-items:center;justify-content:space-between;padding:0 22px;border-bottom:1px solid var(--line)}
.brand{display:flex;gap:14px;align-items:center}.core{width:42px;height:42px;border-radius:50%;background:radial-gradient(circle,#dffbff 0,#38dfff 28%,#116cff 58%,#07101a 70%);box-shadow:0 0 30px #31d9ff}
h1{font-size:20px;letter-spacing:8px;font-weight:300;margin:0}.sub{font-size:11px;color:var(--muted);letter-spacing:2px}
.status{font-size:12px;color:var(--muted)}.status b{color:var(--green)}
.left,.center,.right{background:#07101a;min-height:0}.left,.right{padding:16px;overflow:auto}.center{display:flex;flex-direction:column;min-width:0}
.panel{border:1px solid var(--line);background:rgba(13,21,32,.82);border-radius:8px;padding:12px;margin-bottom:14px}
.panel h2{font-size:12px;letter-spacing:2px;color:var(--cyan);font-weight:500;margin:0 0 10px}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.metric{border:1px solid #1a3b55;border-radius:8px;padding:10px;background:#091420}.metric b{font-size:26px;color:var(--cyan);display:block}.metric span{font-size:11px;color:var(--muted)}
.agent{padding:8px;border-bottom:1px solid #10283a}.agent:last-child{border-bottom:0}.agent b{display:block;font-size:13px}.agent span{font-size:11px;color:var(--muted)}
.chatlog{flex:1;overflow:auto;padding:18px;display:flex;flex-direction:column;gap:12px;background:radial-gradient(circle at 50% 8%,rgba(49,217,255,.10),transparent 28%),#05070b}
.msg{max-width:78%;padding:12px 14px;border-radius:14px;line-height:1.48;font-size:14px;white-space:pre-wrap}
.msg.user{align-self:flex-end;background:#12345a;color:#fff;border-bottom-right-radius:3px}.msg.jarvis{align-self:flex-start;background:#0d1520;border:1px solid var(--line);color:#d8f7ff;border-bottom-left-radius:3px}
.msg .tag{font-size:10px;letter-spacing:1.5px;color:var(--cyan);margin-bottom:6px}.composer{display:flex;gap:10px;padding:14px;background:#07101a;border-top:1px solid var(--line)}
textarea{flex:1;resize:none;min-height:52px;max-height:130px;border:1px solid #1a3b55;background:#091420;color:#e8fbff;border-radius:10px;padding:12px 14px;font:15px Segoe UI,system-ui;outline:none}
textarea:focus{border-color:var(--cyan)}button{border:1px solid #1a4968;background:#0d1e2c;color:#d8f7ff;border-radius:8px;padding:0 14px;cursor:pointer}button:hover{border-color:var(--cyan);color:var(--cyan)}
.primary{background:#11bce8;color:#001018;border-color:#11bce8;font-weight:700}.icon{width:48px;font-size:18px;padding:0}
.task{border:1px solid #17364e;border-radius:8px;padding:10px;margin-bottom:9px;background:#091420}.task b{display:block;font-size:13px}.task span{display:block;font-size:11px;color:var(--muted);margin-top:4px}.pill{display:inline-block;margin-top:7px;padding:2px 7px;border-radius:999px;background:#062d1c;color:var(--green);font-size:10px;text-transform:uppercase}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}.day{min-height:72px;border:1px solid #17364e;border-radius:6px;background:#091420;padding:6px;overflow:hidden}.day .num{font-size:11px;color:var(--muted)}.day.today{border-color:var(--cyan);box-shadow:0 0 14px rgba(49,217,255,.2)}.event{font-size:10px;color:var(--gold);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log{font-size:11px;color:var(--muted);border-bottom:1px solid #10283a;padding:7px 0}.controls{display:flex;gap:8px;flex-wrap:wrap}.controls button{height:34px}.empty{font-size:12px;color:var(--muted)}
@media(max-width:1100px){.shell{grid-template-columns:260px 1fr}.right{display:none}.top{grid-column:1/3}}@media(max-width:760px){.shell{display:flex;flex-direction:column}.left{display:none}.top{height:auto;padding:12px}.chatlog{min-height:0}.msg{max-width:92%}}
</style>
</head>
<body>
<div class="shell">
  <header class="top">
    <div class="brand"><div class="core"></div><div><h1>J.A.R.V.I.S.</h1><div class="sub">DESKTOP COMMAND INTERFACE</div></div></div>
    <div class="status">Railway <b id="online">checking</b> | Model <b id="model">...</b></div>
  </header>
  <aside class="left">
    <div class="panel"><h2>SYSTEM</h2><div class="metric-grid"><div class="metric"><b id="pending">0</b><span>Pending</span></div><div class="metric"><b id="running">0</b><span>Running</span></div><div class="metric"><b id="done">0</b><span>Done</span></div><div class="metric"><b id="error">0</b><span>Error</span></div></div></div>
    <div class="panel"><h2>AGENTS</h2><div id="agents"></div></div>
    <div class="panel"><h2>PC CONTROLS</h2><div class="controls"><button onclick="pollOnce()">Run Tasks</button><button onclick="startWorker()">Auto Worker</button><button onclick="stopWorker()">Stop Worker</button></div></div>
  </aside>
  <main class="center">
    <div id="chat" class="chatlog"></div>
    <div class="composer">
      <button class="icon" title="Voice input" onclick="listen()">🎙</button>
      <button class="icon" title="Speak last reply" onclick="speakLast()">🔊</button>
      <textarea id="input" placeholder="Talk normally. Example: open my work folder, schedule meeting tomorrow, write a post, fix the website bug..."></textarea>
      <button class="primary" onclick="send()">SEND</button>
    </div>
  </main>
  <aside class="right">
    <div class="panel"><h2>CALENDAR</h2><div id="calendar" class="calendar"></div></div>
    <div class="panel"><h2>TASKS</h2><div id="tasks"></div></div>
    <div class="panel"><h2>LOGS</h2><div id="logs"></div></div>
  </aside>
</div>
<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
let dashboard = null, lastReply = '';

function addMsg(role, text){
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = role === 'jarvis' ? '<div class="tag">J.A.R.V.I.S.</div>' + esc(text) : esc(text);
  chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
  if(role === 'jarvis') lastReply = text;
}
function esc(v){return String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmt(v){if(!v)return ''; const d=new Date(v); return isNaN(d)?v:d.toLocaleString();}

async function send(){
  const text = input.value.trim(); if(!text) return;
  input.value = ''; addMsg('user', text); addMsg('jarvis', 'Thinking...');
  const thinking = chat.lastChild;
  try{
    const r = await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,speak:true})});
    const data = await r.json(); thinking.innerHTML = '<div class="tag">J.A.R.V.I.S.</div>' + esc(data.response || data.error || 'No response');
    lastReply = data.response || '';
    await loadDashboard();
  }catch(e){thinking.innerHTML = '<div class="tag">J.A.R.V.I.S.</div>Error: '+esc(e.message);}
}
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});

async function loadHealth(){
  try{const d=await (await fetch('/api/health')).json(); online.textContent=d.status||'online'; model.textContent=d.model||'';}catch(e){online.textContent='offline';}
}
async function loadDashboard(){
  try{dashboard=await (await fetch('/api/dashboard')).json(); renderDashboard();}catch(e){}
}
function renderDashboard(){
  if(!dashboard)return;
  pending.textContent=dashboard.counts?.pending||0; running.textContent=dashboard.counts?.running||0; done.textContent=dashboard.counts?.done||0; error.textContent=dashboard.counts?.error||0;
  agents.innerHTML=(dashboard.agents||[]).map(a=>`<div class="agent"><b>${esc(a.name)}</b><span>${esc(a.description)}</span></div>`).join('');
  const ts=(dashboard.tasks||[]).slice().reverse();
  tasks.innerHTML=ts.slice(0,10).map(t=>`<div class="task"><b>${esc(t.title)}</b><span>${esc(t.agent_id)} | ${fmt(t.updated_at)}</span><span>${esc(t.description)}</span><i class="pill">${esc(t.status)}</i></div>`).join('')||'<div class="empty">No tasks yet.</div>';
  logs.innerHTML=(dashboard.logs||[]).slice().reverse().slice(0,12).map(l=>`<div class="log">${fmt(l.created_at)} | ${esc(l.agent_id)} | ${esc(l.detail)}</div>`).join('');
  renderCalendar(ts);
}
function renderCalendar(tasks){
  const now=new Date(), year=now.getFullYear(), month=now.getMonth();
  const first=new Date(year,month,1), start=first.getDay(), days=new Date(year,month+1,0).getDate();
  const byDay={}; tasks.forEach(t=>{const d=new Date(t.due_at||t.created_at); if(d.getMonth()===month){(byDay[d.getDate()] ||= []).push(t);}});
  let html=''; for(let i=0;i<start;i++) html+='<div class="day"></div>';
  for(let d=1;d<=days;d++){html+=`<div class="day ${d===now.getDate()?'today':''}"><div class="num">${d}</div>${(byDay[d]||[]).slice(0,3).map(t=>`<div class="event">${esc(t.title)}</div>`).join('')}</div>`;}
  calendar.innerHTML=html;
}
async function pollOnce(){await fetch('/api/poll/once',{method:'POST'}); await loadDashboard();}
async function startWorker(){await fetch('/api/poll/start',{method:'POST'}); addMsg('jarvis','Auto worker started. I will keep checking Railway tasks from this PC.');}
async function stopWorker(){await fetch('/api/poll/stop',{method:'POST'}); addMsg('jarvis','Auto worker stopped.');}
async function speakLast(){if(lastReply) await fetch('/api/speak',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:lastReply})});}
function listen(){
  const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!Rec){addMsg('jarvis','Browser voice input is not supported here. Try Chrome or Edge.'); return;}
  const rec = new Rec(); rec.lang='en-US'; rec.onresult=e=>{input.value=e.results[0][0].transcript; send();}; rec.start();
}
addMsg('jarvis','Desktop JARVIS online. Speak or type normally, Sir.');
loadHealth(); loadDashboard(); setInterval(loadDashboard, 8000); setInterval(loadHealth, 20000);
</script>
</body>
</html>
