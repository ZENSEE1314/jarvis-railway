<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC J.A.R.V.I.S.</title>
<style>
*{box-sizing:border-box} :root{--bg:#00060a;--panel:#010d14;--panel2:#010f18;--border:#0d3347;--borderB:#1a5c7a;--pri:#00d4ff;--priDim:#007a99;--ghost:#001f2e;--acc:#ff6b00;--acc2:#ffcc00;--green:#00ff88;--red:#ff3355;--muted:#3a8a9a;--text:#8ffcff;--white:#d8f8ff;--bar:#011520}
body{margin:0;height:100vh;background:var(--bg);color:var(--text);font-family:"Segoe UI",Consolas,system-ui,sans-serif;overflow:hidden;letter-spacing:.2px}
body::before{content:"";position:fixed;inset:0;pointer-events:none;background:linear-gradient(rgba(0,212,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.028) 1px,transparent 1px),radial-gradient(circle at 50% 38%,rgba(0,212,255,.16),transparent 34%);background-size:28px 28px,28px 28px,100% 100%}
.shell{height:100vh;display:grid;grid-template-columns:150px minmax(520px,1fr) 340px;grid-template-rows:76px 1fr;gap:10px;padding:10px;background:linear-gradient(135deg,#00060a,#000b12 50%,#00060a)}
.top{grid-column:1/4;background:linear-gradient(90deg,#000d14,#011520,#000d14);display:flex;align-items:center;justify-content:space-between;padding:0 18px;border:1px solid var(--border);box-shadow:0 0 18px rgba(0,212,255,.12),inset 0 0 20px rgba(0,212,255,.04)}
.brand{display:flex;gap:14px;align-items:center}.core{width:48px;height:48px;border-radius:50%;position:relative;background:radial-gradient(circle,#d8f8ff 0 8%,#00d4ff 14% 22%,#003d55 33%,transparent 43%),conic-gradient(from 30deg,var(--pri),transparent 18%,var(--acc) 23%,transparent 30%,var(--pri) 58%,transparent 70%,var(--pri));box-shadow:0 0 28px var(--pri),inset 0 0 18px #001f2e}
.core::before,.core::after{content:"";position:absolute;inset:-8px;border:1px solid var(--pri);border-left-color:transparent;border-bottom-color:transparent;border-radius:50%;animation:spin 5s linear infinite}.core::after{inset:-15px;border-color:rgba(255,107,0,.6);border-right-color:transparent;animation-duration:8s;animation-direction:reverse}
.core.listening{animation:pulse 1.2s infinite}@keyframes pulse{0%,100%{box-shadow:0 0 24px var(--pri)}50%{box-shadow:0 0 60px var(--green);transform:scale(1.05)}}@keyframes spin{to{transform:rotate(360deg)}}
h1{font-size:20px;letter-spacing:9px;font-weight:400;margin:0;color:var(--pri);text-shadow:0 0 14px rgba(0,212,255,.8)}.sub{font-size:10px;color:var(--priDim);letter-spacing:3px;margin-top:3px}.status{font-size:12px;color:var(--muted);text-transform:uppercase}.status b{color:var(--green)}.wake{margin-left:18px;color:var(--muted)}.wake.on b{color:var(--green)}.wake.off b{color:var(--red)}
.left,.center,.right{min-height:0}.left,.right{overflow:auto}.center{display:grid;grid-template-rows:230px 1fr auto;gap:10px;min-width:0}
.panel{position:relative;border:1px solid var(--border);background:linear-gradient(180deg,rgba(1,15,24,.94),rgba(0,13,20,.88));padding:11px;margin-bottom:10px;box-shadow:inset 0 0 18px rgba(0,212,255,.035)}
.panel::before,.panel::after{content:"";position:absolute;width:18px;height:18px;border-color:var(--borderB);border-style:solid;pointer-events:none}.panel::before{top:-1px;left:-1px;border-width:1px 0 0 1px}.panel::after{right:-1px;bottom:-1px;border-width:0 1px 1px 0}
.panel h2{font-size:11px;letter-spacing:2.4px;color:var(--pri);font-weight:600;margin:0 0 10px;text-transform:uppercase}
.metric-grid{display:grid;grid-template-columns:1fr;gap:8px}.metric{border:1px solid #0b2d40;background:#000d12;padding:8px}.metric b{font-size:24px;color:var(--pri);display:block;line-height:1}.metric span{font-size:10px;color:var(--muted);text-transform:uppercase}
.agent{padding:7px 0;border-bottom:1px solid #062636}.agent:last-child{border-bottom:0}.agent b{display:block;font-size:12px;color:var(--white)}.agent span{font-size:10px;color:var(--muted);line-height:1.35}
.reactor{position:relative;overflow:hidden;border:1px solid var(--border);background:radial-gradient(circle at 50% 50%,rgba(0,212,255,.14),transparent 30%),#00080d;display:grid;place-items:center}
.reactor::before{content:"";width:170px;height:170px;border-radius:50%;border:1px solid rgba(0,212,255,.75);box-shadow:0 0 60px rgba(0,212,255,.35),inset 0 0 35px rgba(0,212,255,.2);background:radial-gradient(circle,#8ffcff 0 4%,#00d4ff 8% 13%,transparent 14%),repeating-conic-gradient(from 0deg,rgba(0,212,255,.9) 0 9deg,transparent 10deg 24deg);animation:spin 12s linear infinite}
.reactor::after{content:"MARK XXXIX-OR LOCAL TOOL CORE";position:absolute;bottom:18px;color:var(--priDim);font-size:11px;letter-spacing:3px}
.chatlog{overflow:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:#00080d;border:1px solid var(--border)}
.msg{max-width:82%;padding:10px 12px;line-height:1.45;font-size:13px;white-space:pre-wrap;border-radius:0}.msg.user{align-self:flex-end;background:#001a24;color:var(--white);border:1px solid #11445e}.msg.jarvis{align-self:flex-start;background:#000d14;border:1px solid var(--borderB);color:var(--text)}.msg .tag{font-size:10px;letter-spacing:1.8px;color:var(--pri);margin-bottom:5px}
.composer{display:flex;gap:8px;padding:10px;background:#000d14;border:1px solid var(--border)}textarea{flex:1;resize:none;min-height:48px;max-height:120px;border:1px solid #174257;background:#000d12;color:var(--white);padding:10px 12px;font:14px Consolas,"Segoe UI",monospace;outline:none}textarea:focus{border-color:var(--pri);box-shadow:0 0 12px rgba(0,212,255,.22)}
button{border:1px solid #17516b;background:#001520;color:var(--text);padding:0 12px;cursor:pointer;font:11px "Segoe UI",system-ui;text-transform:uppercase;letter-spacing:1px}button:hover{border-color:var(--pri);color:var(--pri);background:#001f2e}.primary{background:var(--pri);color:#001018;border-color:var(--pri);font-weight:700}.icon{width:54px;padding:0}
.task{border:1px solid #10384e;background:#000d12;padding:9px;margin-bottom:8px}.task b{display:block;font-size:12px;color:var(--white)}.task span{display:block;font-size:10px;color:var(--muted);margin-top:4px}.pill{display:inline-block;margin-top:6px;padding:2px 6px;background:#001a0d;color:var(--green);font-size:9px;text-transform:uppercase;border:1px solid #00552d}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}.day{min-height:52px;border:1px solid #10384e;background:#000d12;padding:5px;overflow:hidden}.day .num{font-size:10px;color:var(--muted)}.day.today{border-color:var(--acc);box-shadow:0 0 12px rgba(255,107,0,.24)}.event{font-size:9px;color:var(--acc2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log{font-size:10px;color:var(--muted);border-bottom:1px solid #062636;padding:6px 0}.controls{display:grid;gap:7px}.controls button{height:30px}.empty{font-size:11px;color:var(--muted);line-height:1.45}
@media(max-width:1100px){.shell{grid-template-columns:150px 1fr}.right{display:none}.top{grid-column:1/3}}@media(max-width:760px){.shell{display:flex;flex-direction:column;overflow:auto}.left{display:none}.center{display:flex;flex-direction:column}.reactor{min-height:160px}.msg{max-width:94%}}
</style>
</head>
<body>
<div class="shell">
  <header class="top">
    <div class="brand"><div class="core" id="core"></div><div><h1>J.A.R.V.I.S.</h1><div class="sub">DESKTOP COMMAND INTERFACE</div></div></div>
    <div class="status">Railway <b id="online">checking</b> | Model <b id="model">...</b><span id="wakeState" class="wake off"> | Wake <b>off</b></span></div>
  </header>
  <aside class="left">
    <div class="panel"><h2>SYSTEM</h2><div class="metric-grid"><div class="metric"><b id="pending">0</b><span>Pending</span></div><div class="metric"><b id="running">0</b><span>Running</span></div><div class="metric"><b id="done">0</b><span>Done</span></div><div class="metric"><b id="error">0</b><span>Error</span></div></div></div>
    <div class="panel"><h2>AGENTS</h2><div id="agents"></div></div>
    <div class="panel"><h2>PC CONTROLS</h2><div class="controls"><button onclick="toggleWake()">Wake Mode</button><button onclick="pollOnce()">Run Tasks</button><button onclick="startWorker()">Auto Worker</button><button onclick="stopWorker()">Stop Worker</button></div></div>
    <div class="panel"><h2>MARK LOCAL TOOLS</h2><div class="empty">Apps, files, folders, desktop organize, disk usage, reminders, memory, and skill queue run locally before online AI.</div></div>
  </aside>
  <main class="center">
    <div class="reactor"></div>
    <div id="chat" class="chatlog"></div>
    <div class="composer">
      <button class="icon" title="Voice input" onclick="listen()">MIC</button>
      <button class="icon" title="Speak last reply" onclick="speakLast()">SAY</button>
      <textarea id="input" placeholder="Talk normally. Example: open my work folder, schedule meeting tomorrow, write a post, fix the website bug..."></textarea>
      <button class="primary" onclick="send()">SEND</button>
    </div>
  </main>
  <aside class="right">
    <div class="panel"><h2>CALENDAR</h2><div id="calendar" class="calendar"></div></div>
    <div class="panel"><h2>TASKS</h2><div id="tasks"></div></div>
    <div class="panel"><h2>LOGS</h2><div id="logs"></div></div>
  </aside>
</div>
<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
let dashboard = null, lastReply = '', wakeOn = false, conversationActive = false, wakeRecognition = null, wakeRestart = null, wakePaused = false, ignoreUntil = 0;
const endPhrases = /^(no|no thanks|nothing else|that's all|that is all|done|stop|sleep|go sleep|stand down|bye|goodbye)$/i;

function addMsg(role, text){
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = role === 'jarvis' ? '<div class="tag">J.A.R.V.I.S.</div>' + esc(text) : esc(text);
  chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
  if(role === 'jarvis') lastReply = text;
}
function esc(v){return String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmt(v){if(!v)return ''; const d=new Date(v); return isNaN(d)?v:d.toLocaleString();}
function norm(v){return String(v||'').toLowerCase().replace(/[^a-z0-9]+/g,' ').replace(/\s+/g,' ').trim();}
function isLikelySelfEcho(heard){
  const h = norm(heard);
  const r = norm(lastReply).slice(0, 900);
  if(!h || !r) return false;
  if(Date.now() < ignoreUntil) return true;
  if(h.length > 20 && r.includes(h)) return true;
  const hWords = h.split(' ').filter(w=>w.length>3);
  if(hWords.length < 5) return false;
  const overlap = hWords.filter(w=>r.includes(w)).length / hWords.length;
  return overlap > 0.72;
}

async function sendText(text){
  text = String(text || '').trim(); if(!text) return;
  addMsg('user', text); addMsg('jarvis', 'Thinking...');
  const thinking = chat.lastChild;
  try{
    const r = await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
    const data = await r.json();
    let reply = data.response || data.error || 'No response';
    if(conversationActive && !data.error){
      reply += '\n\nAnything else you want me to add or do? Say "no" when finished.';
    }
    thinking.innerHTML = '<div class="tag">J.A.R.V.I.S.</div>' + esc(reply);
    lastReply = reply;
    await speakText(reply);
    await loadDashboard();
  }catch(e){thinking.innerHTML = '<div class="tag">J.A.R.V.I.S.</div>Error: '+esc(e.message);}
}
async function send(){
  const text = input.value.trim(); if(!text) return;
  input.value = '';
  await sendText(text);
}
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});

async function loadHealth(){
  try{const d=await (await fetch('/api/health')).json(); online.textContent=d.status||'online'; model.textContent=d.model||'';}catch(e){online.textContent='offline';}
}
async function loadDashboard(){
  try{dashboard=await (await fetch('/api/dashboard')).json(); renderDashboard();}catch(e){}
}
function renderDashboard(){
  if(!dashboard)return;
  pending.textContent=dashboard.counts?.pending||0; running.textContent=dashboard.counts?.running||0; done.textContent=dashboard.counts?.done||0; error.textContent=dashboard.counts?.error||0;
  agents.innerHTML=(dashboard.agents||[]).map(a=>`<div class="agent"><b>${esc(a.name)}</b><span>${esc(a.description)}</span></div>`).join('');
  const ts=(dashboard.tasks||[]).slice().reverse();
  tasks.innerHTML=ts.slice(0,10).map(t=>`<div class="task"><b>${esc(t.title)}</b><span>${esc(t.agent_id)} | ${fmt(t.updated_at)}</span><span>${esc(t.description)}</span><i class="pill">${esc(t.status)}</i></div>`).join('')||'<div class="empty">No tasks yet.</div>';
  logs.innerHTML=(dashboard.logs||[]).slice().reverse().slice(0,12).map(l=>`<div class="log">${fmt(l.created_at)} | ${esc(l.agent_id)} | ${esc(l.detail)}</div>`).join('');
  renderCalendar(ts);
}
function renderCalendar(tasks){
  const now=new Date(), year=now.getFullYear(), month=now.getMonth();
  const first=new Date(year,month,1), start=first.getDay(), days=new Date(year,month+1,0).getDate();
  const byDay={}; tasks.forEach(t=>{const d=new Date(t.due_at||t.created_at); if(d.getMonth()===month){(byDay[d.getDate()] ||= []).push(t);}});
  let html=''; for(let i=0;i<start;i++) html+='<div class="day"></div>';
  for(let d=1;d<=days;d++){html+=`<div class="day ${d===now.getDate()?'today':''}"><div class="num">${d}</div>${(byDay[d]||[]).slice(0,3).map(t=>`<div class="event">${esc(t.title)}</div>`).join('')}</div>`;}
  calendar.innerHTML=html;
}
async function pollOnce(){await fetch('/api/poll/once',{method:'POST'}); await loadDashboard();}
async function startWorker(){await fetch('/api/poll/start',{method:'POST'}); addMsg('jarvis','Auto worker started. I will keep checking Railway tasks from this PC.');}
async function stopWorker(){await fetch('/api/poll/stop',{method:'POST'}); addMsg('jarvis','Auto worker stopped.');}
function pauseWake(){
  wakePaused = true;
  clearTimeout(wakeRestart);
  if(wakeRecognition){ try{ wakeRecognition.onend = null; wakeRecognition.stop(); }catch(e){} }
}
function resumeWake(){
  wakePaused = false;
  if(wakeOn){
    const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(Rec) runWakeLoop(Rec);
  }
}
async function speakText(text){
  text = String(text || '').trim();
  if(!text) return;
  const wasWakeOn = wakeOn;
  if(wasWakeOn) pauseWake();
  await fetch('/api/speak',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
  const words = text.split(/\s+/).filter(Boolean).length;
  const waitMs = Math.min(30000, Math.max(3500, words * 520));
  ignoreUntil = Date.now() + waitMs + 2500;
  if(wasWakeOn) setTimeout(resumeWake, waitMs);
}
async function speakLast(){if(lastReply) await speakText(lastReply);}
function listen(){
  const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!Rec){addMsg('jarvis','Browser voice input is not supported here. Try Chrome or Edge.'); return;}
  const rec = new Rec(); rec.lang='en-US'; rec.onresult=e=>{input.value=e.results[0][0].transcript; send();}; rec.start();
}
function setWakeState(on, note){
  wakeOn = on;
  const label = !on ? 'off' : conversationActive ? 'active' : 'listening';
  wakeState.className = 'wake ' + (on ? 'on' : 'off');
  wakeState.innerHTML = ' | Wake <b>' + label + '</b>';
  core.classList.toggle('listening', on);
  if(note) addMsg('jarvis', note);
}
function toggleWake(){
  if(wakeOn){ stopWake(); return; }
  startWake();
}
function startWake(){
  const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!Rec){addMsg('jarvis','Wake mode needs Chrome or Edge speech recognition.'); return;}
  conversationActive = false;
  setWakeState(true, 'Online mode enabled. Say "Jarvis" to wake me, then keep talking. Say "no" or "sleep" when finished.');
  runWakeLoop(Rec);
}
function stopWake(){
  conversationActive = false;
  setWakeState(false, 'Online mode disabled.');
  clearTimeout(wakeRestart);
  if(wakeRecognition) wakeRecognition.stop();
  wakeRecognition = null;
}
function runWakeLoop(Rec){
  if(!wakeOn || wakePaused) return;
  wakeRecognition = new Rec();
  wakeRecognition.lang = 'en-US';
  wakeRecognition.continuous = false;
  wakeRecognition.interimResults = false;
  wakeRecognition.onresult = event => {
    const heard = Array.from(event.results).map(r => r[0].transcript).join(' ').trim();
    handleWakeSpeech(heard);
  };
  wakeRecognition.onerror = () => {};
  wakeRecognition.onend = () => {
    if(wakeOn && !wakePaused) wakeRestart = setTimeout(() => runWakeLoop(Rec), 350);
  };
  try{ wakeRecognition.start(); }catch(e){}
}
async function handleWakeSpeech(heard){
  if(!heard) return;
  if(isLikelySelfEcho(heard)) return;
  const clean = heard.trim();
  if(conversationActive){
    if(endPhrases.test(clean)){
      conversationActive = false;
      setWakeState(true);
      const closing = 'Understood. I will stand by until you call Jarvis again.';
      addMsg('jarvis', closing);
      await speakText(closing);
      return;
    }
    await sendText(clean);
    setWakeState(true);
    return;
  }
  const match = clean.match(/\bjarvis\b[\s,.:;-]*(.*)$/i);
  if(!match) return;
  conversationActive = true;
  setWakeState(true);
  const request = match[1].trim();
  if(!request){
    const ready = 'Yes Sir, I am listening. What would you like me to do?';
    addMsg('jarvis',ready);
    await speakText(ready);
    return;
  }
  await sendText(request);
  setWakeState(true);
}
addMsg('jarvis','Desktop JARVIS online. I can work offline for notes, memory, opening PC items, and reminders like "remind me tomorrow at 3pm". Enable Wake Mode, say "Jarvis", then keep talking.');
loadHealth(); loadDashboard(); setInterval(loadDashboard, 8000); setInterval(loadHealth, 20000);
</script>
</body>
</html>
