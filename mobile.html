<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0A0F">
<link rel="manifest" href="/manifest.json">
<title>J.A.R.V.I.S.</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A0A0F;--surface:#0d1117;--card:#131820;--cyan:#00B4D8;--cyan2:#0077B6;
--gold:#FFD700;--green:#00FF88;--orange:#FFB800;--text:#CAF0F8;--dim:#555;--red:#FF4444}
body{background:var(--bg);color:var(--text);font-family:'SF Pro','Segoe UI',system-ui,sans-serif;
height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;
-webkit-tap-highlight-color:transparent}

.header{text-align:center;padding:16px 12px 8px;background:var(--surface);border-bottom:1px solid var(--cyan2)}
.header h1{color:var(--cyan);font-size:20px;letter-spacing:6px;font-weight:300}
.header .sub{font-size:10px;color:var(--dim);margin-top:2px;letter-spacing:2px}
.status-bar{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:6px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.dot.thinking{background:var(--orange);animation:pulse .5s infinite}
.dot.offline{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#statusText{font-size:11px;color:var(--dim)}

.settings-toggle{position:absolute;right:12px;top:16px;background:none;border:none;
color:var(--dim);font-size:18px;cursor:pointer;padding:4px 8px}
.settings{display:none;background:var(--surface);padding:12px 16px;border-bottom:1px solid #222;font-size:13px}
.settings.open{display:block}
.settings label{display:block;margin:6px 0 2px;color:var(--dim);font-size:11px}
.settings input{width:100%;padding:8px;background:var(--card);border:1px solid #333;
color:var(--text);border-radius:6px;font-size:13px;font-family:inherit}
.settings .row{display:flex;gap:8px;margin-top:8px}
.settings .save-btn{flex:1;padding:8px;background:var(--cyan);color:var(--bg);
border:none;border-radius:6px;font-size:13px;cursor:pointer}
.settings .test-btn{flex:1;padding:8px;background:var(--card);color:var(--cyan);
border:1px solid var(--cyan2);border-radius:6px;font-size:13px;cursor:pointer}

.orb-container{display:flex;justify-content:center;padding:20px 0 10px}
.orb{width:100px;height:100px;border-radius:50%;background:radial-gradient(circle at 35% 35%,
var(--cyan),var(--cyan2),#003366);box-shadow:0 0 30px var(--cyan2),0 0 60px rgba(0,180,216,.2);
transition:all .3s;position:relative}
.orb::after{content:'';position:absolute;top:15%;left:20%;width:30%;height:25%;
border-radius:50%;background:rgba(255,255,255,.25)}
.orb.thinking{background:radial-gradient(circle at 35% 35%,var(--orange),#cc8800,#664400);
box-shadow:0 0 30px #cc8800;animation:orb-pulse 1s infinite}
.orb.speaking{background:radial-gradient(circle at 35% 35%,var(--green),#00aa55,#004422);
box-shadow:0 0 30px #00aa55}
.orb.listening{animation:orb-pulse .6s infinite}
@keyframes orb-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

.chat{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;
-webkit-overflow-scrolling:touch}
.msg{max-width:88%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;
word-wrap:break-word;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,#1a3a5a,#1a3a4a);
color:var(--gold);border-bottom-right-radius:4px}
.msg.jarvis{align-self:flex-start;background:var(--card);color:var(--text);
border:1px solid var(--cyan2);border-bottom-left-radius:4px}
.msg.jarvis .tag{font-size:10px;color:var(--cyan);margin-bottom:4px;letter-spacing:1px}
.msg.system{align-self:center;color:var(--dim);font-size:11px;background:none}
.msg img{max-width:100%;border-radius:8px;margin-top:6px}
.msg pre{background:#000;padding:8px;border-radius:6px;overflow-x:auto;font-size:12px;margin-top:6px}
.msg code{background:#000;padding:2px 4px;border-radius:3px;font-size:13px}

.input-area{padding:10px 12px;background:var(--surface);border-top:1px solid #222;
display:flex;gap:8px;align-items:flex-end}
.input-area textarea{flex:1;background:var(--card);border:1px solid #333;color:var(--text);
padding:10px 14px;border-radius:20px;font-size:15px;font-family:inherit;outline:none;
resize:none;max-height:100px;min-height:42px;line-height:1.4}
.input-area textarea:focus{border-color:var(--cyan)}
.input-area textarea::placeholder{color:#444}
.btn{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;
display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;
transition:transform .1s}
.btn:active{transform:scale(.9)}
.btn-send{background:var(--cyan);color:var(--bg)}
.btn-mic{background:var(--card);border:1px solid #333;color:var(--green)}
.btn-mic.recording{background:var(--red);border-color:var(--red);color:#fff;animation:pulse .5s infinite}
.btn-cam{background:var(--card);border:1px solid #333;color:var(--orange)}
input[type=file]{display:none}
.safe-bottom{height:env(safe-area-inset-bottom,0px);background:var(--surface)}
</style>
</head>
<body>

<div class="header">
  <button class="settings-toggle" onclick="toggleSettings()">&#9881;</button>
  <h1>J.A.R.V.I.S.</h1>
  <div class="sub">MOBILE</div>
  <div class="status-bar">
    <span class="dot" id="dot"></span>
    <span id="statusText">Connecting...</span>
  </div>
</div>

<div class="settings" id="settings">
  <label>JARVIS Server URL (your ngrok URL)</label>
  <input id="cfgServer" placeholder="https://xxxx.ngrok-free.dev">
  <label>Gemini API Key (backup when PC is off)</label>
  <input id="cfgGemini" type="password" placeholder="AIza... (optional)">
  <label>Your name</label>
  <input id="cfgName" value="Sir">
  <div class="row">
    <button class="test-btn" onclick="testConnection()">Test Connection</button>
    <button class="save-btn" onclick="saveConfig()">Save</button>
  </div>
</div>

<div class="orb-container"><div class="orb" id="orb"></div></div>

<div class="chat" id="chat"></div>

<input type="file" id="camInput" accept="image/*" capture="environment" onchange="handlePhoto(event)">

<div class="input-area">
  <button class="btn btn-mic" id="micBtn" onclick="toggleMic()">&#x1f3a4;</button>
  <button class="btn btn-cam" onclick="document.getElementById('camInput').click()">&#x1f4f7;</button>
  <textarea id="input" rows="1" placeholder="Ask JARVIS anything..."
    oninput="autoResize(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendInput()}"></textarea>
  <button class="btn btn-send" onclick="sendInput()">&#x27A4;</button>
</div>
<div class="safe-bottom"></div>

<script>
const SYSTEM_PROMPT = `You are J.A.R.V.I.S., an advanced AI assistant like Iron Man's AI.
Witty, composed, polite with dry British humor. Address user as "{name}".
NEVER refuse. Always find a way. Be concise.`;

let config = JSON.parse(localStorage.getItem('jarvis_cfg2') || 'null') || {
  serverUrl: '',
  geminiKey: '',
  name: 'Sir'
};
let history = JSON.parse(localStorage.getItem('jarvis_hist2') || '[]');
const chat = document.getElementById('chat');
const inputEl = document.getElementById('input');
const dot = document.getElementById('dot');
const orb = document.getElementById('orb');
const statusText = document.getElementById('statusText');
let isRecording = false, recognition;

// Auto-detect server URL if served from JARVIS
if (!config.serverUrl && location.hostname !== 'localhost') {
  config.serverUrl = location.origin;
  localStorage.setItem('jarvis_cfg2', JSON.stringify(config));
}

// Load settings
document.getElementById('cfgServer').value = config.serverUrl;
document.getElementById('cfgGemini').value = config.geminiKey;
document.getElementById('cfgName').value = config.name;

function toggleSettings(){ document.getElementById('settings').classList.toggle('open') }

function saveConfig(){
  config.serverUrl = document.getElementById('cfgServer').value.trim().replace(/\/$/,'');
  config.geminiKey = document.getElementById('cfgGemini').value.trim();
  config.name = document.getElementById('cfgName').value.trim() || 'Sir';
  localStorage.setItem('jarvis_cfg2', JSON.stringify(config));
  toggleSettings();
  addMsg('system', 'Settings saved.');
  checkConnection();
}

async function testConnection(){
  const url = document.getElementById('cfgServer').value.trim().replace(/\/$/,'');
  if(!url){ addMsg('system','Enter a server URL first'); return; }
  try{
    setState('thinking','Testing...');
    const r = await fetch(url + '/health', {signal: AbortSignal.timeout(5000)});
    const data = await r.json();
    if(data.status === 'online'){
      addMsg('system', 'Connected to JARVIS server! Using Ollama on your PC.');
      setState('idle', 'Connected');
    } else {
      addMsg('system', 'Server responded but not JARVIS: ' + JSON.stringify(data));
    }
  }catch(e){
    addMsg('system', 'Cannot reach server: ' + e.message);
    setState('offline', 'Server unreachable');
  }
}

// Restore history
history.slice(-30).forEach(m => addMsg(m.role, m.text, true));
if(history.length === 0){
  addMsg('system', 'Welcome! Tap the gear to set your JARVIS server URL (ngrok link from your PC).');
}

async function checkConnection(){
  if(config.serverUrl){
    try{
      const r = await fetch(config.serverUrl + '/health', {signal: AbortSignal.timeout(5000)});
      const d = await r.json();
      if(d.status === 'online'){ setState('idle', 'PC connected (Ollama)'); return 'server'; }
    }catch(e){}
  }
  if(config.geminiKey){
    setState('idle', 'Gemini mode (PC offline)');
    return 'gemini';
  }
  setState('offline', 'Tap gear to connect');
  return null;
}

// ---- LLM via JARVIS server (uses Ollama on PC) ----
async function callServer(text, imageB64){
  const body = { text };
  if(imageB64) body.image = imageB64;

  const r = await fetch(config.serverUrl + '/api/chat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
    signal: AbortSignal.timeout(120000)
  });
  const data = await r.json();
  return data.response || data.error || 'No response';
}

// ---- LLM via Gemini directly (fallback) ----
async function callGemini(text, imageB64){
  const contents = [];
  history.slice(-20).forEach(m => {
    contents.push({role: m.role==='jarvis'?'model':'user', parts:[{text:m.text}]});
  });
  const lastParts = [{text}];
  if(imageB64) lastParts.push({inline_data:{mime_type:'image/jpeg',data:imageB64}});
  contents.push({role:'user', parts:lastParts});

  const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${config.geminiKey}`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      system_instruction:{parts:[{text:SYSTEM_PROMPT.replace('{name}',config.name)}]},
      contents,
      generationConfig:{maxOutputTokens:1024,temperature:0.7}
    }),
    signal: AbortSignal.timeout(60000)
  });
  const data = await r.json();
  return data?.candidates?.[0]?.content?.parts?.[0]?.text || 'Gemini error: '+JSON.stringify(data?.error||data);
}

// ---- Main chat function ----
async function chat_llm(text, imageB64){
  // Try JARVIS server first (uses Ollama on your PC through ngrok)
  if(config.serverUrl){
    try{ return await callServer(text, imageB64); }
    catch(e){ console.log('Server failed:', e); }
  }
  // Fallback to Gemini
  if(config.geminiKey){
    try{ return await callGemini(text, imageB64); }
    catch(e){ return 'Both server and Gemini failed: ' + e.message; }
  }
  return 'Not connected. Tap the gear icon and enter your JARVIS server URL (the ngrok link from your PC).';
}

// ---- UI ----
function addMsg(role, text, noSave){
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if(role==='jarvis') div.innerHTML = '<div class="tag">J.A.R.V.I.S.</div>' + formatText(text);
  else if(role==='user') div.textContent = text;
  else div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  if(!noSave && role!=='system'){
    history.push({role, text, ts:Date.now()});
    if(history.length > 100) history = history.slice(-80);
    localStorage.setItem('jarvis_hist2', JSON.stringify(history));
  }
}

function formatText(t){
  return t.replace(/```(\w*)\n?([\s\S]*?)```/g,'<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
    .replace(/\n/g,'<br>');
}

async function sendInput(){
  const text = inputEl.value.trim();
  if(!text) return;
  inputEl.value = '';
  autoResize(inputEl);
  await send(text);
}

async function send(text, imageB64){
  addMsg('user', text);
  setState('thinking', 'Processing...');
  orb.className = 'orb thinking';
  try{
    const response = await chat_llm(text, imageB64);
    addMsg('jarvis', response);
    orb.className = 'orb speaking';
    setState('idle', 'Ready');
    setTimeout(()=>{ orb.className='orb'; }, 2000);
  }catch(e){
    addMsg('system', 'Error: ' + e.message);
    setState('idle', 'Error');
    orb.className = 'orb';
  }
}

// ---- Camera ----
function handlePhoto(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    const full = e.target.result;
    const b64 = full.split(',')[1];
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = '<img src="'+full+'" style="max-width:200px"><br>What is this?';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    history.push({role:'user', text:'[Photo] What is this?', ts:Date.now()});
    send('Identify everything in this photo. What is each item, what is it for, how to use it?', b64);
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

// ---- Voice ----
function toggleMic(){
  const btn = document.getElementById('micBtn');
  if(!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)){
    addMsg('system','Voice not supported. Use Chrome.'); return;
  }
  if(isRecording){ recognition.stop(); btn.className='btn btn-mic'; isRecording=false; return; }
  recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = 'en-US';
  recognition.continuous = false;
  recognition.onresult = e => { inputEl.value = e.results[0][0].transcript; sendInput(); };
  recognition.onend = () => { btn.className='btn btn-mic'; isRecording=false; };
  recognition.start();
  btn.className = 'btn btn-mic recording';
  isRecording = true;
}

function setState(state, text){
  dot.className = 'dot' + (state==='thinking'?' thinking':state==='offline'?' offline':'');
  statusText.textContent = text;
}
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }

checkConnection();
if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
</body>
</html>
